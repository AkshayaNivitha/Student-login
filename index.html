<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student App - Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-left">
      <h1>Welcome Back</h1>
      <p>Login to access your student dashboard, track tasks, and manage your profile.</p>
    </div>

    <div class="auth-right">
      <form class="auth-form">
        <h2>Login</h2>

        <label>Email</label>
        <input type="email" placeholder="Enter your email" />

        <label>Password</label>
        <input type="password" placeholder="Enter your password" />

        <a href="#" class="small-link">Forgot password?</a>

        <a href="dashboard.html" class="btn">Sign In</a>

        <p class="switch-text">
          Don’t have an account?
          <a href="profile.html">View Profile Page</a>
        </p>
      </form>
    </div>
  </div>
</body>
</html>
